spring:
  datasource:
    url: jdbc:h2:file:./data/propertydb
    driver-class-name: org.h2.Driver
    username: sa
    password: 1111

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: true
      path: /h2-console
